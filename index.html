<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoki - Bongkar koin Neo Party</title>
    <link rel="icon" type="image/png" href="cathoki.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cloud-container">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>

    <div class="mobile-container">
        <header class="header">
            <div class="logo-container">
                <img src="cathoki.png" alt="Cuan" class="main-logo">
            </div>
            <h1 class="header-title">BONGKAR KOIN <br>RESMI NEO PARTY</h1>
                <a href="https://tawk.to/chat/67f9111ed014271912746be8/1ioieloaf" target="_blank" class="btn-download-3d" style="text-decoration: none; display: inline-block;">
    <span class="icon">⬇</span> Live Chat
</a>
        </header>

        <div class="card-3d">
            <div class="card-tag">Masukkan Data Anda</div>
            <div class="form-body">
                <div class="input-group">
                    <label>Neo ID</label>
                    <input type="number" id="player_id_input" placeholder="Masukkan ID">
                </div>
                <div class="input-group">
                    <label>No. Whatsapp</label>
                    <input type="tel" id="whatsapp_input" placeholder="No. Whatsapp">
                </div>
                <div class="btn-img-container" onclick="validasiAwal()">
                    <img src="konfirmasi.png" alt="Konfirmasi" class="img-button">
                </div>
            </div>
        </div>

        <div class="tabs-3d">
            <div class="tab-btn active">BONGKAR</div>
        </div>

        <div class="price-grid">
            <div class="price-card hot" onclick="handleBongkar('1B', '62.000')">
                <img src="ribbon.png" class="ribbon-hot" alt="Hot">
                <div class="card-content">
                    <img src="koin.png" class="koin-icon-payload" alt="Koin">
                    <div class="text-info"><span class="val">1B</span><span class="prc">62.000</span></div>
                </div>
            </div>
            
            <div class="price-card hot" onclick="handleBongkar('2B', '124.000')">
                <img src="ribbon.png" class="ribbon-hot" alt="Hot">
                <div class="card-content"><img src="koin.png" class="koin-icon-payload"><div class="text-info"><span class="val">2B</span><span class="prc">124.000</span></div></div>
            </div>

            <div class="price-card" onclick="handleBongkar('3B', '186.000')">
                <div class="card-content"><img src="koin.png" class="koin-icon-payload"><div class="text-info"><span class="val">3B</span><span class="prc">184.000</span></div></div>
            </div>

            <div class="price-card" onclick="handleBongkar('4B', '248.000')">
                <div class="card-content"><img src="koin.png" class="koin-icon-payload"><div class="text-info"><span class="val">4B</span><span class="prc">248.000</span></div></div>
            </div>

            <div class="price-card" onclick="handleBongkar('5B', '310.000')">
                <div class="card-content"><img src="koin.png" class="koin-icon-payload"><div class="text-info"><span class="val">5B</span><span class="prc">310.000</span></div></div>
            </div>

            <div class="price-card" onclick="handleBongkar('10B', '620.000')">
                <div class="card-content"><img src="koin.png" class="koin-icon-payload"><div class="text-info"><span class="val">10B</span><span class="prc">620.000</span></div></div>
            </div>

            <div class="price-card" onclick="handleBongkar('30B', '1.860.000')">
                <div class="card-content"><img src="koin.png" class="koin-icon-payload"><div class="text-info"><span class="val">30B</span><span class="prc">1.860.000</span></div></div>
            </div>

            <div class="price-card" onclick="handleBongkar('40B', '2.480.000')">
                <div class="card-content"><img src="koin.png" class="koin-icon-payload"><div class="text-info"><span class="val">40B</span><span class="prc">2.480.000</span></div></div>
            </div>
        </div>

        <div class="footer-note-3d">
            Website Bongkar Resmi 24 Jam
        </div>
    </div>

    <div id="orderModal" class="modal-overlay">
        <div class="modal-3d-board">
            <div class="modal-header">DETAIL PESANAN</div>
            <div class="modal-body">
                <div class="detail-row"><span>ID Pemain</span><strong id="res-id">-</strong></div>
                <div class="detail-row"><span>Nickname</span><strong id="res-nickname">Mengecek...</strong></div>
                <div class="detail-row"><span>Pesanan</span><strong id="res-product">-</strong></div>
                <div class="detail-row"><span>Total Harga</span><strong id="res-price">-</strong></div>
            </div>
            <div class="modal-footer">
                <div class="btn-img-container" onclick="kirimKeAdmin()">
                    <img src="konfirmasi.png" alt="Konfirmasi" id="btn-final-img" class="img-button">
                </div>
                <button class="btn-modal-cancel" onclick="closeModal()">BATAL</button>
            </div>
        </div>
    </div>

    <script>
        function validasiAwal() {
            const id = document.getElementById('player_id_input').value;
            const wa = document.getElementById('whatsapp_input').value;
            if(!id || !wa) return alert("Isi ID dan WhatsApp dulu!");
            alert("Data tersimpan. Pilih nominal di bawah.");
        }

        async function handleBongkar(nominal, harga) {
            const id = document.getElementById('player_id_input').value;
            const wa = document.getElementById('whatsapp_input').value;
            if (!id || !wa) return alert("Isi data di atas dulu!");

            document.getElementById('orderModal').style.display = 'flex';
            document.getElementById('res-id').innerText = id;
            document.getElementById('res-product').innerText = "Bongkar " + nominal;
            document.getElementById('res-price').innerText = "Rp " + harga;
            
            const nickSpan = document.getElementById('res-nickname');
            const btnFinal = document.getElementById('btn-final-img');
            nickSpan.innerText = "Mengecek...";
            btnFinal.style.opacity = "0.5";

            try {
                const response = await fetch('/api/cek', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ player_id: id })
                });
                const res = await response.json();
                if (res.En === 0 && res.Data) {
                    nickSpan.innerText = res.Data.player_nick;
                    nickSpan.style.color = "#27ae60";
                    btnFinal.style.opacity = "1";
                } else {
                    nickSpan.innerText = "ID Tidak Ditemukan";
                    nickSpan.style.color = "#e74c3c";
                }
            } catch (e) {
                nickSpan.innerText = "Server Error";
            }
        }

        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

        function kirimKeAdmin() {
    const id = document.getElementById('res-id').innerText;
    const nick = document.getElementById('res-nickname').innerText;
    const prod = document.getElementById('res-product').innerText;
    const price = document.getElementById('res-price').innerText;

    // Pastikan ID ditemukan sebelum lanjut
    if (nick === "Mengecek..." || nick === "ID Tidak Ditemukan") {
        alert("Harap tunggu pengecekan ID selesai atau pastikan ID benar!");
        return;
    }

    // Mengarahkan ke detail.html sambil membawa data game
    const detailUrl = `detail.html?id=${encodeURIComponent(id)}&nick=${encodeURIComponent(nick)}&prod=${encodeURIComponent(prod)}&price=${encodeURIComponent(price)}`;
    
    window.location.href = detailUrl;
}
    </script>
</body>
</html>
