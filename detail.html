<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Pencairan - Neo Party</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .struk-list { text-align: left; padding: 10px; }
        .struk-item { 
            display: flex; 
            align-items: center;
            justify-content: space-between; 
            border-bottom: 1px dashed #d4a76a; 
            padding: 10px 0;
        }
        .struk-label { color: #555; font-weight: bold; font-size: 13px; flex: 1; }
        .struk-input { 
            flex: 1.5;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #33ccff;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 14px;
            font-weight: 900;
            color: #2980b9;
            outline: none;
            text-align: right;
        }
        .struk-input:focus { border-color: #FD7100; background: #fff; }
        .struk-readonly { color: #2980b9; font-weight: 900; font-size: 14px; text-align: right; flex: 1.5; }
    </style>
</head>
<body>

    <div class="cloud-container">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>

    <div class="mobile-container">
        <header class="header">
            <div class="logo-container">
                <img src="cathoki.png" alt="Cuan" class="main-logo">
            </div>
            <h1 class="header-title">DATA TUJUAN PENCAIRAN</h1>
        </header>

        <div class="modal-3d-board" style="display: block; position: relative; width: 100%;">
            <div class="modal-header">FORM PENCAIRAN</div>
            <div class="modal-body struk-list">
                <div class="struk-item">
                    <span class="struk-label">ID / Nick:</span>
                    <span class="struk-readonly" id="final-id-nick">-</span>
                </div>
                <div class="struk-item">
                    <span class="struk-label">Item Bongkar:</span>
                    <span class="struk-readonly" id="final-prod">-</span>
                </div>

                <div class="struk-item" style="margin-top: 10px; border-top: 2px solid #d4a76a;">
                    <span class="struk-label">Nama Pemilik:</span>
                    <input type="text" id="edit-acc-name" class="struk-input" placeholder="Nama Rekening">
                </div>
                <div class="struk-item">
                    <span class="struk-label">No. Rekening:</span>
                    <input type="number" id="edit-acc-num" class="struk-input" placeholder="No Rek/HP">
                </div>
                <div class="struk-item">
                    <span class="struk-label">Bank/E-Wallet:</span>
                    <input type="text" id="edit-bank" class="struk-input" placeholder="DANA/BRI/BCA">
                </div>
            </div>

            <div class="modal-footer">
                <div class="btn-img-container" onclick="lanjutKeKirim()">
                    <img src="konfirmasi.png" alt="Lanjut" class="img-button">
                </div>
                <button class="btn-modal-cancel" onclick="window.location.href='index.html'">BATAL</button>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('final-id-nick').innerText = (params.get('id') || '-') + " / " + (params.get('nick') || '-');
        document.getElementById('final-prod').innerText = params.get('prod') || '-';

        function lanjutKeKirim() {
            const accName = document.getElementById('edit-acc-name').value;
            const accNum = document.getElementById('edit-acc-num').value;
            const bankName = document.getElementById('edit-bank').value;

            if (!accName || !accNum || !bankName) {
                alert("Harap lengkapi Data Rekening!");
                return;
            }

            params.set('acc_name', accName);
            params.set('acc_num', accNum);
            params.set('bank', bankName);

            window.location.href = 'detailv2.html?' + params.toString();
        }
    </script>
</body>
</html>
