<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terimah kasih</title>
  <link rel="icon" type="image/png" href="cathoki.png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Overlay khusus untuk memfokuskan popup */
        .success-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .popup-sukses {
            background: #fff7e6;
            border: 4px solid #d4a76a;
            border-radius: 30px;
            padding: 30px 20px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .icon-check {
            width: 80px;
            height: 80px;
            background: #27ae60;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.4);
        }

        .popup-sukses h2 {
            color: #5d4037;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .popup-sukses p {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .countdown-box {
            background: #f39c12;
            color: white;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        @keyframes bounceIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="cloud-container">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>

    <div class="mobile-container">
        <header class="header">
            <div class="logo-container">
                <img src="cathoki.png" alt="Cuan" class="main-logo">
            </div>
        </header>
    </div>

    <div class="success-overlay">
        <div class="popup-sukses">
            <div class="icon-check">✓</div>
            <h2>TERIMA KASIH!</h2>
            <p>Laporan Anda telah diterima oleh Admin.<br>Mohon tunggu proses pencairan koin Anda.</p>
            
            <div class="countdown-box">
                Kembali ke Beranda dalam <span id="timer">5</span> detik
            </div>
        </div>
    </div>

    <script>
        let seconds = 5;
        const timerDisplay = document.getElementById('timer');

        // Fungsi Hitung Mundur
        const countdown = setInterval(() => {
            seconds--;
            timerDisplay.innerText = seconds;

            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = 'index.html'; // Kembali ke index
            }
        }, 1000);
    </script>
</body>
</html>
