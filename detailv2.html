<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Pengiriman - Bongkar Koin Neo Party</title>
    <link rel="icon" type="image/png" href="cathoki.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-box {
            background: #fff3cd;
            border: 2px dashed #856404;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
        }
        .id-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
        }
        .id-icon { width: 35px; height: 35px; }
        .id-number { font-size: 24px; font-weight: 900; color: #000; letter-spacing: 1px; }
        .copy-btn {
            background: #856404; color: white; border: none;
            padding: 4px 10px; border-radius: 5px; font-size: 12px;
            cursor: pointer; font-weight: bold;
        }
        .upload-section {
            margin-top: 15px; text-align: center; border: 2px dotted #33ccff;
            border-radius: 15px; padding: 15px; background: rgba(255,255,255,0.3);
        }
        #preview-img { width: 100%; max-width: 160px; border-radius: 10px; margin-top: 10px; display: none; margin: 10px auto; border: 2px solid white; }
        
        /* Loading overlay */
        #loading { display: none; color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="cloud-container">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>

    <div class="mobile-container">
        <header class="header">
            <div class="logo-container"><img src="cathoki.png" alt="Cuan" class="main-logo"></div>
            <h1 class="header-title">KONFIRMASI PENGIRIMAN</h1>
        </header>

        <div class="admin-box">
    <p style="margin:0; font-size: 13px; font-weight: bold; color: #856404;">SILAKAN KIRIM CHIP KE ID ADMIN:</p>
    <div class="id-display" style="display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 0;">
        <img src="idbos.png" alt="ID Logo" style="width: 40px; height: 40px; object-fit: contain;">
        
        <span id="targetId" class="id-number" style="font-size: 26px; font-weight: 900; color: #000; letter-spacing: 1px;">2422380</span>
        
        <button onclick="copyID()" class="copy-btn" style="background: #FD7100; color: white; border: none; padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; transition: 0.2s;">
            SALIN
        </button>
    </div>
    <p style="margin:0; font-size: 11px; color: #d63031; font-weight: bold;">*Pastikan nominal dan ID tujuan sudah benar!</p>
</div>

        <div class="modal-3d-board" style="display: block; position: relative; width: 100%; margin-top: 5px;">
            <div class="modal-header">UPLOAD BUKTI SS</div>
            <div class="modal-body">
                <div style="display: flex; justify-content: space-between; border-bottom: 1px dashed #d4a76a; padding: 8px 0; color: #333;">
                    <span style="font-size: 13px; font-weight: bold;">Total Terima:</span>
                    <span id="final-price" style="font-weight: 900; color: #e67e22;">-</span>
                </div>

                <div class="upload-section">
                    <p style="font-size: 12px; font-weight: bold; margin-bottom: 8px; color: #064B7F;">Pilih Foto Screenshot Kirim Chip:</p>
                    <input type="file" id="ss_bukti" accept="image/*" onchange="previewFile()" style="font-size: 11px; width: 100%;">
                    <img id="preview-img" src="" alt="Bukti Kirim">
                </div>
            </div>

            <div class="modal-footer" style="text-align: center;">
                <div id="loading">Sedang mengirim...</div>
                <div class="btn-img-container" id="btnContainer" onclick="kirimTelegram()">
                    <img src="konfirmasi.png" alt="Konfirmasi" class="img-button" onerror="this.src='https://placehold.co/180x50?text=KONFIRMASI'">
                </div>
                <button class="btn-modal-cancel" onclick="window.history.back()">KEMBALI</button>
            </div>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8597331224:AAFnZ8fuiYeyUKVlypItH1Gutz23PCOMT6Y'; 
        const TELEGRAM_CHAT_ID = '6604182176';

        const params = new URLSearchParams(window.location.search);
        document.getElementById('final-price').innerText = params.get('price') || '-';

        function copyID() {
            const idText = document.getElementById('targetId').innerText;
            navigator.clipboard.writeText(idText);
            alert("ID Admin disalin!");
        }

        function previewFile() {
            const preview = document.getElementById('preview-img');
            const file = document.getElementById('ss_bukti').files[0];
            const reader = new FileReader();
            reader.onloadend = () => { preview.src = reader.result; preview.style.display = "block"; }
            if (file) { reader.readAsDataURL(file); }
        }

        async function kirimTelegram() {
    const fileInput = document.getElementById('ss_bukti');
    const btn = document.getElementById('btnContainer');
    const load = document.getElementById('loading');
    
    if (fileInput.files.length === 0) {
        alert("Wajib upload bukti SS pengiriman!");
        return;
    }

    const params = new URLSearchParams(window.location.search);
    const playerID = params.get('id') || '-';
    const nick = params.get('nick') || '-';
    const prod = params.get('prod') || '-';
    const price = params.get('price') || '-';
    const accName = params.get('acc_name') || '-';
    const accNum = params.get('acc_num') || '-';
    const bank = params.get('bank') || '-';

    // MENGGUNAKAN HTML PARSING AGAR AMAN DARI KARAKTER KHUSUS SEPERTI _ ATAU *
    const caption = `<b>🚀 NOTIFIKASI BONGKAR BARU 🚀</b>\n\n` +
                  `👤 <b>ID/Nick:</b> ${playerID} (${nick})\n` +
                  `💰 <b>Item:</b> ${prod}\n` +
                  `💵 <b>Total Cair:</b> ${price}\n\n` +
                  `🏦 <b>Bank:</b> ${bank}\n` +
                  `👤 <b>Nama:</b> ${accName}\n` +
                  `💳 <b>Rek:</b> ${accNum}\n\n` +
                  `✅ <b>Segera cek chip dan proses!</b>`;

    const formData = new FormData();
    formData.append('chat_id', TELEGRAM_CHAT_ID);
    formData.append('photo', fileInput.files[0]);
    formData.append('caption', caption);
    formData.append('parse_mode', 'HTML'); // GANTI KE HTML

    btn.style.pointerEvents = "none";
    btn.style.opacity = "0.5";
    load.style.display = "block";

    try {
        const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, { 
            method: 'POST', 
            body: formData 
        });
        
        const result = await response.json();
        
        if(response.ok) {
            alert("Berhasil! Laporan telah terkirim.");
            window.location.href = 'sukses.html';
        } else {
            // Menampilkan error asli dari Telegram agar Anda tahu apa yang salah
            alert("Gagal: " + result.description);
            btn.style.pointerEvents = "auto";
            btn.style.opacity = "1";
        }
    } catch (err) {
        alert("Terjadi kesalahan sistem/jaringan.");
        btn.style.pointerEvents = "auto";
        btn.style.opacity = "1";
    } finally {
        load.style.display = "none";
    }
}
    </script>
</body>
</html>
