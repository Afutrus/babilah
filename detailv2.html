<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Pencairan - Neo Party</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tambahan khusus struk agar terlihat seperti list detail */
        .struk-list { text-align: left; padding: 10px; }
        .struk-item { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px dashed #d4a76a; 
            padding: 8px 0;
            font-size: 14px;
        }
        .struk-label { color: #555; font-weight: bold; }
        .struk-value { color: #2980b9; font-weight: 900; }
    </style>
</head>
<body>

    <div class="cloud-container">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>

    <div class="mobile-container">
        <header class="header">
            <div class="logo-container">
                <img src="cathoki.png" alt="Cuan" class="main-logo">
            </div>
            <h1 class="header-title">RINGKASAN PESANAN</h1>
        </header>

        <div class="modal-3d-board" style="display: block; position: relative; width: 100%;">
            <div class="modal-header">STRUK BONGKAR</div>
            <div class="modal-body struk-list">
                <div class="struk-item">
                    <span class="struk-label">ID Pemain:</span>
                    <span class="struk-value" id="final-id">-</span>
                </div>
                <div class="struk-item">
                    <span class="struk-label">Nickname:</span>
                    <span class="struk-value" id="final-nick">-</span>
                </div>
                <div class="struk-item">
                    <span class="struk-label">Item:</span>
                    <span class="struk-value" id="final-prod">-</span>
                </div>
                <div class="struk-item">
                    <span class="struk-label">Total Cair:</span>
                    <span class="struk-value" id="final-price">-</span>
                </div>
                <div class="struk-item">
                    <span class="struk-label">Nama Tujuan:</span>
                    <span class="struk-value" id="final-acc-name">-</span>
                </div>
                <div class="struk-item">
                    <span class="struk-label">No. Rekening:</span>
                    <span class="struk-value" id="final-acc-num">-</span>
                </div>
            </div>
            <div class="modal-footer">
                <div class="btn-img-container" onclick="kirimKeWA()">
                    <img src="konfirmasi.png" alt="Kirim WA" class="img-button">
                </div>
                <button class="btn-modal-cancel" onclick="window.location.href='index.html'">BATAL</button>
            </div>
        </div>

        <div class="footer-note-3d">
            Klik konfirmasi untuk meneruskan struk ini ke WhatsApp Admin.
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        // Tampilkan Data ke Struk
        document.getElementById('final-id').innerText = params.get('id') || '-';
        document.getElementById('final-nick').innerText = params.get('nick') || '-';
        document.getElementById('final-prod').innerText = params.get('prod') || '-';
        document.getElementById('final-price').innerText = params.get('price') || '-';
        document.getElementById('final-acc-name').innerText = params.get('acc_name') || '-';
        document.getElementById('final-acc-num').innerText = params.get('acc_num') || '-';

        function kirimKeWA() {
            const id = params.get('id');
            const nick = params.get('nick');
            const prod = params.get('prod');
            const price = params.get('price');
            const accName = params.get('acc_name');
            const accNum = params.get('acc_num');

            const text = `*KONFIRMASI BONGKAR CHIP*%0A` +
                         `----------------------------%0A` +
                         `ID Pemain : ${id}%0A` +
                         `Nickname  : ${nick}%0A` +
                         `Item      : ${prod}%0A` +
                         `Total     : ${price}%0A` +
                         `----------------------------%0A` +
                         `*DATA PENERIMA*%0A` +
                         `Nama      : ${accName}%0A` +
                         `No. Rek   : ${accNum}%0A` +
                         `----------------------------%0A` +
                         `_Mohon segera diproses admin, terima kasih._`;

            // Ganti nomor WA di bawah ini
            window.open(`https://wa.me/628123456789?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
